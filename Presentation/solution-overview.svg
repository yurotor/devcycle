<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, -apple-system, sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="12" width="900" height="40" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="18" font-weight="bold">DevCycle</text>

  <!-- Top row: 3 main feature boxes -->
  <!-- Knowledge Base -->
  <rect x="30" y="72" width="260" height="150" rx="8" fill="white" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="72" width="260" height="30" rx="8" fill="#6366f1"/>
  <rect x="30" y="94" width="260" height="8" fill="#6366f1"/>
  <text x="160" y="92" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Knowledge Base</text>
  <text x="45" y="122" fill="#475569" font-size="11">Clone &amp; analyze repos</text>
  <text x="45" y="140" fill="#475569" font-size="11">Cross-repo architecture wiki</text>
  <text x="45" y="158" fill="#475569" font-size="11">AI-powered Q&amp;A chat</text>
  <text x="45" y="176" fill="#475569" font-size="11">Interview-driven gap filling</text>
  <text x="45" y="194" fill="#475569" font-size="11">Institutional knowledge capture</text>

  <!-- SDLC Compliance -->
  <rect x="320" y="72" width="260" height="150" rx="8" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="320" y="72" width="260" height="30" rx="8" fill="#059669"/>
  <rect x="320" y="94" width="260" height="8" fill="#059669"/>
  <text x="450" y="92" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SDLC Compliance</text>
  <text x="335" y="122" fill="#475569" font-size="11">Jira Epic sync &amp; phase mapping</text>
  <text x="335" y="140" fill="#475569" font-size="11">AI Design Docs (RFC template)</text>
  <text x="335" y="158" fill="#475569" font-size="11">AI Test Plans</text>
  <text x="335" y="176" fill="#475569" font-size="11">Phase gate tracking</text>
  <text x="335" y="194" fill="#475569" font-size="11">Signoff status &amp; alerts</text>

  <!-- Observability -->
  <rect x="610" y="72" width="260" height="150" rx="8" fill="white" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <rect x="610" y="72" width="260" height="30" rx="8" fill="#d97706"/>
  <rect x="610" y="94" width="260" height="8" fill="#d97706"/>
  <text x="740" y="92" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Observability</text>
  <text x="625" y="122" fill="#475569" font-size="11">Elastic log insights</text>
  <text x="625" y="140" fill="#475569" font-size="11">New Relic APM metrics</text>
  <text x="625" y="158" fill="#475569" font-size="11">Error pattern detection</text>
  <text x="625" y="176" fill="#475569" font-size="11">AI root cause analysis</text>
  <text x="625" y="194" fill="#475569" font-size="11">Business activity counters</text>

  <!-- Middle row: 3 supporting feature boxes -->
  <!-- Ticket Lifecycle -->
  <rect x="30" y="245" width="260" height="130" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="245" width="260" height="30" rx="8" fill="#8b5cf6"/>
  <rect x="30" y="267" width="260" height="8" fill="#8b5cf6"/>
  <text x="160" y="265" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Ticket Lifecycle</text>
  <text x="45" y="295" fill="#475569" font-size="11">Analyze → Plan → Design → Implement</text>
  <text x="45" y="313" fill="#475569" font-size="11">AI-assisted analysis &amp; PRDs</text>
  <text x="45" y="331" fill="#475569" font-size="11">Task breakdown &amp; wave planning</text>
  <text x="45" y="349" fill="#475569" font-size="11">Code generation &amp; review</text>

  <!-- Pipeline Monitoring -->
  <rect x="320" y="245" width="260" height="130" rx="8" fill="white" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="320" y="245" width="260" height="30" rx="8" fill="#0891b2"/>
  <rect x="320" y="267" width="260" height="8" fill="#0891b2"/>
  <text x="450" y="265" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Pipeline Monitoring</text>
  <text x="335" y="295" fill="#475569" font-size="11">Jenkins &amp; ADO pipeline tracking</text>
  <text x="335" y="313" fill="#475569" font-size="11">Stage-level visibility</text>
  <text x="335" y="331" fill="#475569" font-size="11">AI failure analysis</text>
  <text x="335" y="349" fill="#475569" font-size="11">Fix &amp; re-trigger from platform</text>

  <!-- Multi-Workspace -->
  <rect x="610" y="245" width="260" height="130" rx="8" fill="white" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="610" y="245" width="260" height="30" rx="8" fill="#64748b"/>
  <rect x="610" y="267" width="260" height="8" fill="#64748b"/>
  <text x="740" y="265" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Multi-Workspace</text>
  <text x="625" y="295" fill="#475569" font-size="11">Team isolation</text>
  <text x="625" y="313" fill="#475569" font-size="11">Separate KB, repos, Jira per team</text>
  <text x="625" y="331" fill="#475569" font-size="11">Independent observability config</text>
  <text x="625" y="349" fill="#475569" font-size="11">Shared credentials</text>

  <!-- Connector arrows from top to middle -->
  <path d="M160 222 L160 245" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="none"/>
  <path d="M450 222 L450 245" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
  <path d="M740 222 L740 245" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>

  <!-- Integration bar -->
  <rect x="30" y="400" width="840" height="44" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="60" y="426" fill="#94a3b8" font-size="11" font-weight="bold">INTEGRATIONS</text>

  <!-- Integration badges -->
  <rect x="175" y="410" width="80" height="24" rx="4" fill="#334155"/>
  <text x="215" y="426" text-anchor="middle" fill="white" font-size="11">Jira</text>

  <rect x="270" y="410" width="110" height="24" rx="4" fill="#334155"/>
  <text x="325" y="426" text-anchor="middle" fill="white" font-size="11">Azure DevOps</text>

  <rect x="395" y="410" width="80" height="24" rx="4" fill="#334155"/>
  <text x="435" y="426" text-anchor="middle" fill="white" font-size="11">Jenkins</text>

  <rect x="490" y="410" width="80" height="24" rx="4" fill="#334155"/>
  <text x="530" y="426" text-anchor="middle" fill="white" font-size="11">Elastic</text>

  <rect x="585" y="410" width="90" height="24" rx="4" fill="#334155"/>
  <text x="630" y="426" text-anchor="middle" fill="white" font-size="11">New Relic</text>

  <rect x="690" y="410" width="95" height="24" rx="4" fill="#334155"/>
  <text x="737" y="426" text-anchor="middle" fill="white" font-size="11">Confluence</text>

  <!-- Arrows from features to integration bar -->
  <path d="M160 375 L160 400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <path d="M450 375 L450 400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <path d="M740 375 L740 400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>

  <!-- Footer: AI Engine note -->
  <rect x="30" y="464" width="840" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="450" y="488" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">Powered by AI: Claude via AWS Bedrock — all data stays within org boundary</text>
</svg>
